<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IRONLOG — Strength Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f0e;
  --bg2: #1a1a18;
  --bg3: #252522;
  --amber: #e8a020;
  --amber2: #f5c44a;
  --amber3: #7a4e08;
  --text: #f0ede6;
  --muted: #8a8880;
  --dim: #3a3a37;
  --danger: #e04040;
  --green: #3ab06a;
  --mono: 'Space Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; background: var(--bg); }
body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--cond); overflow: hidden;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }
#view { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 0 calc(72px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
#view::-webkit-scrollbar { display: none; }

/* ── NAV ── */
#nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(15,15,14,.97);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--dim);
  display: flex;
  padding-bottom: max(var(--safe-bottom), 8px);
  z-index: 100;
}
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 8px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: var(--cond); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; transition: color .15s; }
.nav-btn.active { color: var(--amber); }
.nav-btn svg { width: 20px; height: 20px; }

/* ── HEADER ── */
.page-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--dim); position: sticky; top: 0; background: var(--bg); z-index: 10; }
.page-title { font-size: 28px; font-weight: 800; letter-spacing: -.01em; text-transform: uppercase; line-height: 1; }
.page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* ── CARDS ── */
.card { background: var(--bg2); border: 1px solid var(--dim); border-radius: 10px; padding: 16px; margin: 0 16px 12px; }
.card-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

/* ── DASHBOARD ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 16px 0; }
.stat-box { background: var(--bg2); border: 1px solid var(--dim); border-radius: 10px; padding: 14px; }
.stat-val { font-size: 28px; font-weight: 800; color: var(--amber); font-family: var(--mono); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-top: 4px; }
.last-session-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--dim); }
.last-session-item:last-child { border-bottom: none; padding-bottom: 0; }
.ex-name { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.ex-detail { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-top: 2px; }
.ex-vol { font-size: 20px; font-weight: 800; color: var(--amber); font-family: var(--mono); }

/* ── SESSION ── */
.ex-selector { margin: 16px; display: flex; gap: 8px; align-items: center; }
.ex-selector select { flex: 1; background: var(--bg2); border: 1px solid var(--dim); border-radius: 8px; color: var(--text); font-family: var(--cond); font-size: 16px; font-weight: 600; padding: 12px 14px; appearance: none; -webkit-appearance: none; outline: none; }
.btn { background: var(--amber); color: #0f0f0e; border: none; border-radius: 8px; padding: 12px 20px; font-family: var(--cond); font-size: 15px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; transition: transform .1s, background .15s; }
.btn:active { transform: scale(.97); }
.btn.secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--dim); }
.btn.danger { background: var(--danger); color: white; }
.btn.small { padding: 8px 14px; font-size: 13px; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ── SET INPUT ── */
.set-input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.input-block label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
.input-block input { width: 100%; background: var(--bg3); border: 1px solid var(--dim); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 22px; font-weight: 700; padding: 10px 8px; text-align: center; outline: none; transition: border-color .15s; -webkit-appearance: none; appearance: none; }
.input-block input:focus { border-color: var(--amber); }
.rpe-row { display: flex; gap: 6px; margin-bottom: 12px; }
.rpe-btn { flex: 1; background: var(--bg3); border: 1px solid var(--dim); border-radius: 6px; color: var(--muted); font-family: var(--cond); font-size: 15px; font-weight: 700; padding: 8px 4px; cursor: pointer; transition: all .12s; }
.rpe-btn.active { background: var(--amber3); border-color: var(--amber); color: var(--amber2); }

/* ── SERIES LOGGED ── */
.series-list { display: flex; flex-direction: column; gap: 6px; }
.series-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--bg3); border-radius: 8px; border: 1px solid var(--dim); }
.series-num { font-size: 12px; font-weight: 700; color: var(--muted); font-family: var(--mono); min-width: 24px; }
.series-data { flex: 1; font-size: 15px; font-weight: 700; font-family: var(--mono); }
.series-rpe { font-size: 12px; color: var(--amber); font-family: var(--mono); font-weight: 700; }
.series-vol { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.series-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }

/* ── HIST LOAD ── */
.hist-badge { background: var(--amber3); color: var(--amber2); font-size: 11px; font-family: var(--mono); font-weight: 700; padding: 4px 8px; border-radius: 5px; border: 1px solid var(--amber3); }

/* ── REST TIMER ── */
#timer-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(10,10,9,.97); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; opacity: 0; pointer-events: none; transition: opacity .3s;
  padding-top: var(--safe-top);
  padding-bottom: max(var(--safe-bottom), 20px);
}
#timer-overlay.visible { opacity: 1; pointer-events: all; }
#timer-ring { position: relative; width: 220px; height: 220px; }
#timer-ring svg { transform: rotate(-90deg); }
#timer-ring circle.bg { fill: none; stroke: var(--dim); stroke-width: 6; }
#timer-ring circle.prog { fill: none; stroke: var(--amber); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .9s linear; }
#timer-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
#timer-seconds { font-size: 56px; font-weight: 800; font-family: var(--mono); color: var(--amber); line-height: 1; }
#timer-label { font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
#timer-desc { font-size: 18px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .06em; }
.timer-controls { display: flex; gap: 10px; }

/* ── PROGRESS ── */
.chart-wrap { position: relative; height: 200px; margin: 0 0 12px; }
.ex-history-item { padding: 10px 0; border-bottom: 1px solid var(--dim); }
.ex-history-item:last-child { border-bottom: none; }
.ex-history-date { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
.ex-history-sets { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.set-pill { font-size: 11px; font-family: var(--mono); font-weight: 700; background: var(--bg3); border: 1px solid var(--dim); border-radius: 4px; padding: 3px 7px; color: var(--text); }

/* ── EXERCISES ── */
.ex-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--dim); }
.ex-item:last-child { border-bottom: none; }
.ex-item-name { font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
.ex-item-cat { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 600; letter-spacing: .06em; }
.tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--dim); color: var(--muted); }

/* ── NOTES ── */
.notes-area { width: 100%; background: var(--bg3); border: 1px solid var(--dim); border-radius: 8px; color: var(--text); font-family: var(--cond); font-size: 15px; padding: 10px 12px; resize: vertical; min-height: 70px; outline: none; transition: border-color .15s; }
.notes-area:focus { border-color: var(--amber); }

/* ── TOASTS ── */
#toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--amber); color: var(--amber2); font-family: var(--cond); font-size: 14px; font-weight: 700; letter-spacing: .05em; padding: 10px 20px; border-radius: 8px; z-index: 300; opacity: 0; transition: opacity .2s; pointer-events: none; text-transform: uppercase; }
#toast.show { opacity: 1; }

/* ── ADD EXERCISE MODAL ── */
#modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 150; display: none; align-items: flex-end; padding-top: var(--safe-top); }
#modal-bg.open { display: flex; }
#modal { background: var(--bg2); border-radius: 16px 16px 0 0; border: 1px solid var(--dim); padding: 24px 20px calc(24px + max(var(--safe-bottom), 16px)); width: 100%; }
.modal-title { font-size: 22px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; }
.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.form-row label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.form-row input, .form-row select { background: var(--bg3); border: 1px solid var(--dim); border-radius: 8px; color: var(--text); font-family: var(--cond); font-size: 16px; font-weight: 600; padding: 11px 13px; outline: none; width: 100%; -webkit-appearance: none; appearance: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--amber); }

/* ── SECTION TITLE ── */
.section-title { font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 16px 16px 8px; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.empty-sub { font-size: 13px; margin-top: 6px; font-family: var(--mono); }

/* ── NOTES SAVED ── */
.note-tag { font-size: 11px; font-family: var(--mono); color: var(--amber); background: var(--amber3); border: 1px solid var(--amber3); border-radius: 4px; padding: 2px 6px; max-width: 100%; word-break: break-word; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--dim); margin: 4px 16px; }

/* ── SELECT WRAPPER ── */
.select-wrap { position: relative; }
.select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 14px; }

.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

.vol-change { font-size: 11px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; font-weight: 700; }
.vol-up { background: rgba(58,176,106,.15); color: var(--green); }
.vol-down { background: rgba(224,64,64,.12); color: var(--danger); }
</style>
</head>
<body>
<div id="app">
  <div id="view"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="goTo('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </button>
    <button class="nav-btn" id="nav-session" onclick="goTo('session')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      Sesión
    </button>
    <button class="nav-btn" id="nav-progress" onclick="goTo('progress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 17 9 11 13 15 21 7"/><line x1="3" y1="21" x2="21" y2="21"/></svg>
      Progresión
    </button>
    <button class="nav-btn" id="nav-exercises" onclick="goTo('exercises')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M7 6.5v11M17 6.5v11"/></svg>
      Ejercicios
    </button>
  </nav>
</div>

<!-- Timer overlay -->
<div id="timer-overlay">
  <div style="font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Descansando</div>
  <div id="timer-ring">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle class="bg" cx="110" cy="110" r="96"/>
      <circle class="prog" id="timer-circle" cx="110" cy="110" r="96" stroke-dasharray="603" stroke-dashoffset="0"/>
    </svg>
    <div id="timer-text">
      <div id="timer-seconds">90</div>
      <div id="timer-label">segundos</div>
    </div>
  </div>
  <div id="timer-desc">Próxima serie lista</div>
  <div class="timer-controls" style="flex-direction:column;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn secondary small" onclick="addTime(-15)">−15s</button>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <input id="timer-manual" type="number" min="5" max="600" value="90"
          style="width:80px;background:var(--bg3);border:1px solid var(--dim);border-radius:8px;color:var(--amber);font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;padding:6px 4px;outline:none"
          oninput="setManualTime(this.value)">
        <span style="font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase">seg</span>
      </div>
      <button class="btn secondary small" onclick="addTime(15)">+15s</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn secondary small" onclick="applyManualTime()">↺ Reiniciar</button>
      <button class="btn small" onclick="skipTimer()">Saltar ↗</button>
    </div>
  </div>
</div>

<!-- Add exercise modal -->
<div id="modal-bg" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title">Nuevo ejercicio</div>
    <div class="form-row"><label>Nombre</label><input id="ex-name-input" placeholder="Sentadilla trasera" maxlength="40"></div>
    <div class="form-row">
      <label>Categoría</label>
      <div class="select-wrap"><select id="ex-cat-input">
        <option>Piernas</option><option>Empuje</option><option>Jalón</option>
        <option>Core</option><option>Cardio</option><option>Olímpico</option><option>Otro</option>
      </select></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="flex:1" onclick="saveNewExercise()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════
// DATA LAYER
// ═══════════════════════════════
const DB_KEY = 'ironlog_v2';
let db = JSON.parse(localStorage.getItem(DB_KEY) || 'null') || {
  exercises: [
    { id: 'sq', name: 'Sentadilla', category: 'Piernas' },
    { id: 'bp', name: 'Press Banca', category: 'Empuje' },
    { id: 'dl', name: 'Peso Muerto', category: 'Jalón' },
    { id: 'ohp', name: 'Press Militar', category: 'Empuje' },
    { id: 'row', name: 'Remo Barra', category: 'Jalón' },
    { id: 'rdl', name: 'RDL', category: 'Piernas' },
    { id: 'dip', name: 'Fondos', category: 'Empuje' },
    { id: 'pu', name: 'Dominadas', category: 'Jalón' },
  ],
  sessions: [],
  currentSession: null
};
const save = () => localStorage.setItem(DB_KEY, JSON.stringify(db));

// ═══════════════════════════════
// TIMER
// ═══════════════════════════════
let timerInterval = null, timerTotal = 90, timerLeft = 90;
const circumference = 2 * Math.PI * 96;
const timerCircle = document.getElementById('timer-circle');
const timerSecs = document.getElementById('timer-seconds');
const timerOverlay = document.getElementById('timer-overlay');

function startTimer(seconds = 90) {
  clearInterval(timerInterval);
  timerTotal = seconds; timerLeft = seconds;
  timerCircle.style.strokeDasharray = circumference;
  const inp = document.getElementById('timer-manual');
  if (inp) inp.value = seconds;
  updateTimerDisplay();
  timerOverlay.classList.add('visible');
  timerInterval = setInterval(() => {
    timerLeft--;
    updateTimerDisplay();
    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      onTimerEnd();
    }
  }, 1000);
}
function updateTimerDisplay() {
  timerSecs.textContent = timerLeft;
  const pct = timerLeft / timerTotal;
  timerCircle.style.strokeDashoffset = circumference * (1 - pct);
  if (timerLeft <= 10) timerCircle.style.stroke = '#e04040';
  else if (timerLeft <= 30) timerCircle.style.stroke = '#e8a020';
  else timerCircle.style.stroke = 'var(--amber)';
}
function onTimerEnd() {
  timerOverlay.classList.remove('visible');
  beep();
  vibrate([200, 100, 200, 100, 400]);
  showToast('¡Listo para la próxima serie!');
}
function skipTimer() { clearInterval(timerInterval); timerOverlay.classList.remove('visible'); }
function addTime(delta) {
  timerLeft = Math.max(5, timerLeft + delta);
  timerTotal = Math.max(timerTotal, timerLeft);
  const inp = document.getElementById('timer-manual');
  if (inp) inp.value = timerLeft;
  updateTimerDisplay();
}
function setManualTime(val) {
  const v = Math.max(5, Math.min(600, parseInt(val) || 5));
  timerLeft = v;
  timerTotal = v;
  updateTimerDisplay();
}
function applyManualTime() {
  const inp = document.getElementById('timer-manual');
  const v = Math.max(5, Math.min(600, parseInt(inp?.value) || 90));
  startTimer(v);
}

let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = [880, 660, 880];
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = audioCtx.currentTime + i * 0.15;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t); o.stop(t + 0.12);
    });
  } catch(e) {}
}
function vibrate(pattern) { try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {} }

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════
// ROUTING
// ═══════════════════════════════
let currentPage = 'dashboard';
function goTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  render();
}

function render() {
  const v = document.getElementById('view');
  if (currentPage === 'dashboard') v.innerHTML = renderDashboard();
  else if (currentPage === 'session') v.innerHTML = renderSession();
  else if (currentPage === 'progress') { v.innerHTML = renderProgress(); initProgressChart(); }
  else if (currentPage === 'exercises') v.innerHTML = renderExercises();
}

// ═══════════════════════════════
// DASHBOARD
// ═══════════════════════════════
function renderDashboard() {
  const sessions = db.sessions;
  const last = sessions[sessions.length - 1];
  const totalVol = (s) => s.entries.reduce((a, e) => a + e.sets.reduce((b, se) => b + se.weight * se.reps, 0), 0);
  const totalSets = (s) => s.entries.reduce((a, e) => a + e.sets.length, 0);

  let statsHtml = '';
  if (last) {
    const vol = totalVol(last);
    const prevSessions = sessions.slice(0, -1);
    let volChangeHtml = '';
    if (prevSessions.length > 0) {
      const prevVol = totalVol(prevSessions[prevSessions.length - 1]);
      if (prevVol > 0) {
        const pct = ((vol - prevVol) / prevVol * 100).toFixed(0);
        const cls = pct >= 0 ? 'vol-up' : 'vol-down';
        volChangeHtml = `<span class="vol-change ${cls}">${pct >= 0 ? '+' : ''}${pct}%</span>`;
      }
    }
    statsHtml = `
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val">${(vol/1000).toFixed(1)}<span style="font-size:14px;color:var(--muted)"> t</span></div>
          <div class="stat-lbl">Volumen ${volChangeHtml}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${totalSets(last)}</div>
          <div class="stat-lbl">Series totales</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${last.entries.length}</div>
          <div class="stat-lbl">Ejercicios</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${sessions.length}</div>
          <div class="stat-lbl">Sesiones</div>
        </div>
      </div>`;
  }

  let lastSessionHtml = '';
  if (last) {
    const items = last.entries.map(e => {
      const vol = e.sets.reduce((a, s) => a + s.weight * s.reps, 0);
      const best = e.sets.reduce((a, s) => Math.max(a, s.weight), 0);
      const noteTag = e.note ? `<span class="note-tag">${e.note}</span>` : '';
      return `<div class="last-session-item">
        <div>
          <div class="ex-name">${getExName(e.exId)}</div>
          <div class="ex-detail">${e.sets.length} series · Mejor: ${best}kg ${noteTag}</div>
        </div>
        <div class="ex-vol">${(vol/1000).toFixed(2)}t</div>
      </div>`;
    }).join('');
    lastSessionHtml = `
      <div class="section-title">Última sesión — ${formatDate(last.date)}</div>
      <div class="card">${items || '<div class="empty-text" style="font-size:14px;padding:8px 0;color:var(--muted)">Sin entradas</div>'}</div>`;
  }

  const ongoing = db.currentSession;
  const ongoingBanner = ongoing ? `
    <div style="margin:16px 16px 0;background:rgba(232,160,32,.12);border:1px solid var(--amber3);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="goTo('session')">
      <div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:6px"><span class="pulse-dot"></span> Sesión activa</div>
        <div style="font-size:14px;font-family:var(--mono);margin-top:3px;color:var(--muted)">${ongoing.entries.reduce((a,e)=>a+e.sets.length,0)} series registradas</div>
      </div>
      <div style="font-size:22px;color:var(--amber)">→</div>
    </div>` : '';

  const emptyState = !last && !ongoing ? `
    <div class="empty">
      <div class="empty-icon">🏋️</div>
      <div class="empty-text">Sin sesiones aún</div>
      <div class="empty-sub">Inicia tu primera sesión en la pestaña "Sesión"</div>
    </div>` : '';

  return `
    <div class="page-header">
      <div class="page-title">IRONLOG</div>
      <div class="page-sub">Strength Tracker MVP</div>
    </div>
    ${ongoingBanner}
    ${statsHtml}
    ${lastSessionHtml}
    ${emptyState}
    <div style="height:8px"></div>`;
}

// ═══════════════════════════════
// SESSION
// ═══════════════════════════════
let selectedRPE = 8;

function renderSession() {
  const s = db.currentSession;

  if (!s) {
    return `
      <div class="page-header">
        <div class="page-title">Nueva sesión</div>
        <div class="page-sub">${formatDate(new Date().toISOString())}</div>
      </div>
      <div style="padding:24px 16px">
        <button class="btn" style="width:100%;padding:18px;font-size:20px" onclick="startSession()">
          ＋ Iniciar sesión
        </button>
      </div>
      ${db.sessions.length > 0 ? `<div class="section-title">Historial rápido</div>${renderSessionHistory(3)}` : ''}`;
  }

  const entriesHtml = s.entries.map((e, ei) => {
    const exName = getExName(e.exId);
    const lastLoad = getLastLoad(e.exId, s.id);
    const histBadge = lastLoad ? `<span class="hist-badge">Última: ${lastLoad.weight}kg × ${lastLoad.reps}</span>` : '';
    const setsHtml = e.sets.map((set, si) => `
      <div class="series-row">
        <span class="series-num">S${si+1}</span>
        <span class="series-data">${set.weight}kg × ${set.reps}</span>
        <span class="series-rpe">RPE ${set.rpe}</span>
        <span class="series-vol">${(set.weight*set.reps).toLocaleString()}kg</span>
        <button class="series-delete" onclick="deleteSet(${ei},${si})">✕</button>
      </div>`).join('');

    const volTotal = e.sets.reduce((a, s) => a + s.weight * s.reps * e.sets.length, 0);
    return `
      <div class="card" style="margin-top:${ei===0?'16px':'0'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.03em">${exName}</div>
            ${histBadge}
          </div>
          <button class="btn danger small" onclick="removeEntry(${ei})">✕</button>
        </div>
        <div class="series-list">${setsHtml || '<div style="font-size:13px;color:var(--muted);padding:4px 0;font-family:var(--mono)">Sin series aún</div>'}</div>
        ${e.sets.length ? `<div style="margin-top:8px;font-size:12px;font-family:var(--mono);color:var(--muted)">Volumen total: ${e.sets.reduce((a,s)=>a+s.weight*s.reps,0).toLocaleString()} kg (${e.sets.length} series)</div>` : ''}
        <div style="margin-top:12px">
          <div class="set-input-grid" id="inputs-${ei}">
            <div class="input-block"><label>Kg</label><input type="number" id="w-${ei}" value="${getLastWeight(e)}" min="0" step="2.5" inputmode="decimal"></div>
            <div class="input-block"><label>Reps</label><input type="number" id="r-${ei}" value="${getLastReps(e)}" min="1" max="100" inputmode="numeric"></div>
            <div class="input-block"><label>Vol. s.</label><input type="text" id="vol-preview-${ei}" readonly style="font-size:15px;color:var(--muted);cursor:default"></div>
          </div>
          <div class="card-label" style="margin-bottom:5px">RPE</div>
          <div class="rpe-row" id="rpe-row-${ei}">
            ${[6,7,8,9,10].map(r=>`<button class="rpe-btn ${r===selectedRPE?'active':''}" onclick="setRPE(${ei},${r})">${r}</button>`).join('')}
          </div>
          <textarea class="notes-area" id="note-${ei}" placeholder="Notas: técnica, fatiga, próxima sesión...">${e.note||''}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn secondary small" onclick="saveNote(${ei})">Guardar nota</button>
            <button class="btn" style="flex:1" onclick="logSet(${ei})">✓ Marcar serie</button>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div class="page-title">Sesión activa</div>
        <div class="page-sub">${formatDate(s.date)} · ${s.entries.reduce((a,e)=>a+e.sets.length,0)} series</div>
      </div>
      <button class="btn danger small" onclick="finishSession()">Finalizar</button>
    </div>

    <div class="ex-selector">
      <div class="select-wrap" style="flex:1">
        <select id="ex-select">
          ${db.exercises.map(ex=>`<option value="${ex.id}">${ex.name} · ${ex.category}</option>`).join('')}
        </select>
      </div>
      <button class="btn" onclick="addEntry()">＋</button>
    </div>

    ${entriesHtml || `<div class="empty"><div class="empty-icon">💪</div><div class="empty-text">Selecciona un ejercicio</div><div class="empty-sub">y pulsa ＋ para empezar</div></div>`}
    <div style="height:8px"></div>`;
}

function startSession() {
  db.currentSession = { id: Date.now().toString(), date: new Date().toISOString(), entries: [] };
  save(); render();
}

function finishSession() {
  if (!db.currentSession) return;
  if (db.currentSession.entries.length === 0) { db.currentSession = null; save(); render(); return; }
  db.sessions.push(db.currentSession);
  db.currentSession = null;
  save();
  showToast('Sesión guardada — ¡Buen trabajo!');
  goTo('dashboard');
}

function addEntry() {
  const id = document.getElementById('ex-select').value;
  if (!id || !db.currentSession) return;
  const exists = db.currentSession.entries.find(e => e.exId === id);
  if (exists) { showToast('Ejercicio ya añadido'); return; }
  db.currentSession.entries.push({ exId: id, sets: [], note: '' });
  save(); render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.card');
    if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function removeEntry(ei) {
  db.currentSession.entries.splice(ei, 1);
  save(); render();
}

function setRPE(ei, val) {
  selectedRPE = val;
  document.querySelectorAll(`#rpe-row-${ei} .rpe-btn`).forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === val);
  });
}

function logSet(ei) {
  const w = parseFloat(document.getElementById(`w-${ei}`).value);
  const r = parseInt(document.getElementById(`r-${ei}`).value);
  if (!w || !r || w <= 0 || r <= 0) { showToast('Peso y reps deben ser > 0'); return; }
  db.currentSession.entries[ei].sets.push({ weight: w, reps: r, rpe: selectedRPE });
  save(); render();
  vibrate([30]);
  startTimer(90);
}

function deleteSet(ei, si) {
  db.currentSession.entries[ei].sets.splice(si, 1);
  save(); render();
}

function saveNote(ei) {
  const note = document.getElementById(`note-${ei}`)?.value.trim();
  db.currentSession.entries[ei].note = note;
  save();
  showToast('Nota guardada');
}

function getLastWeight(entry) {
  if (entry.sets.length > 0) return entry.sets[entry.sets.length - 1].weight;
  const last = getLastLoad(entry.exId);
  return last ? last.weight : 60;
}
function getLastReps(entry) {
  if (entry.sets.length > 0) return entry.sets[entry.sets.length - 1].reps;
  const last = getLastLoad(entry.exId);
  return last ? last.reps : 5;
}

// Live vol preview — set up after render
function setupVolPreviews() {
  document.querySelectorAll('[id^="w-"]').forEach(wEl => {
    const idx = wEl.id.split('-')[1];
    const rEl = document.getElementById(`r-${idx}`);
    const vEl = document.getElementById(`vol-preview-${idx}`);
    const update = () => {
      const v = (parseFloat(wEl.value)||0) * (parseInt(rEl.value)||0);
      if (vEl) vEl.value = v > 0 ? v.toLocaleString() + 'kg' : '—';
    };
    wEl.addEventListener('input', update);
    rEl?.addEventListener('input', update);
    update();
  });
}

// ═══════════════════════════════
// PROGRESS
// ═══════════════════════════════
let progressChart = null;
let selectedProgressEx = null;

function renderProgress() {
  if (!selectedProgressEx && db.exercises.length) selectedProgressEx = db.exercises[0].id;
  const exOptions = db.exercises.map(ex => `<option value="${ex.id}" ${ex.id===selectedProgressEx?'selected':''}>${ex.name}</option>`).join('');

  const historyHtml = getExHistory(selectedProgressEx).reverse().map(sess => {
    const pills = sess.sets.map(s => `<span class="set-pill">${s.weight}×${s.reps} R${s.rpe}</span>`).join('');
    const vol = sess.sets.reduce((a,s)=>a+s.weight*s.reps*sess.sets.length,0);
    const noteTag = sess.note ? `<span class="note-tag">${sess.note}</span>` : '';
    return `<div class="ex-history-item">
      <div class="ex-history-date">${formatDate(sess.date)} · Vol: ${vol.toLocaleString()}kg</div>
      <div class="ex-history-sets">${pills}</div>
      ${noteTag ? `<div style="margin-top:5px">${noteTag}</div>` : ''}
    </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div class="page-title">Progresión</div>
      <div class="page-sub">Volumen por ejercicio</div>
    </div>
    <div style="padding:16px 16px 8px">
      <div class="select-wrap">
        <select onchange="changeProgressEx(this.value)">${exOptions}</select>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Volumen de carga (Peso × Reps × Series)</div>
      <div class="chart-wrap"><canvas id="prog-chart"></canvas></div>
    </div>
    <div class="section-title">Historial detallado</div>
    <div class="card">
      ${historyHtml || `<div style="font-size:13px;color:var(--muted);font-family:var(--mono);padding:4px 0">Sin datos para este ejercicio</div>`}
    </div>
    <div style="height:8px"></div>`;
}

function changeProgressEx(id) {
  selectedProgressEx = id;
  render();
  initProgressChart();
}

function initProgressChart() {
  const canvas = document.getElementById('prog-chart');
  if (!canvas) return;
  if (progressChart) { progressChart.destroy(); progressChart = null; }

  const history = getExHistory(selectedProgressEx);
  const labels = history.map(h => formatDateShort(h.date));
  const data = history.map(h => h.sets.reduce((a,s)=>a+s.weight*s.reps*h.sets.length,0));
  const maxW = history.map(h => h.sets.reduce((a,s)=>Math.max(a,s.weight),0));

  progressChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Volumen (kg)',
          data,
          backgroundColor: 'rgba(232,160,32,.25)',
          borderColor: 'rgba(232,160,32,.7)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'Peso máx (kg)',
          data: maxW,
          borderColor: '#e8a020',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointBackgroundColor: '#e8a020',
          pointRadius: 4,
          tension: 0.35,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.06)' }, ticks: { color: '#8a8880', font: { family: "'Space Mono'" , size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,.06)' }, ticks: { color: '#8a8880', font: { family: "'Space Mono'", size: 10 } }, position: 'left' },
        y2: { grid: { display: false }, ticks: { color: '#e8a020', font: { family: "'Space Mono'", size: 10 } }, position: 'right' },
      }
    }
  });
}

function getExHistory(exId) {
  const result = [];
  db.sessions.forEach(sess => {
    const entry = sess.entries.find(e => e.exId === exId);
    if (entry && entry.sets.length > 0) {
      result.push({ date: sess.date, sets: entry.sets, note: entry.note });
    }
  });
  if (db.currentSession) {
    const entry = db.currentSession.entries.find(e => e.exId === exId);
    if (entry && entry.sets.length > 0) {
      result.push({ date: db.currentSession.date, sets: entry.sets, note: entry.note });
    }
  }
  return result;
}

// ═══════════════════════════════
// EXERCISES
// ═══════════════════════════════
function renderExercises() {
  const byCategory = {};
  db.exercises.forEach(ex => {
    if (!byCategory[ex.category]) byCategory[ex.category] = [];
    byCategory[ex.category].push(ex);
  });

  const html = Object.entries(byCategory).map(([cat, exs]) => `
    <div class="section-title">${cat}</div>
    <div class="card">
      ${exs.map(ex => {
        const sessionCount = db.sessions.filter(s => s.entries.find(e => e.exId === ex.id)).length;
        const lastLoad = getLastLoad(ex.id);
        return `<div class="ex-item">
          <div>
            <div class="ex-item-name">${ex.name}</div>
            <div class="ex-item-cat">${sessionCount} sesiones${lastLoad ? ` · Última: ${lastLoad.weight}kg × ${lastLoad.reps}` : ''}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn secondary small" onclick="goToProgressEx('${ex.id}')">📈</button>
            <button class="btn secondary small" style="color:var(--danger)" onclick="deleteExercise('${ex.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');

  return `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div class="page-title">Ejercicios</div>
        <div class="page-sub">${db.exercises.length} ejercicios</div>
      </div>
      <button class="btn small" onclick="openModal()">＋ Nuevo</button>
    </div>
    ${html}
    <div style="height:8px"></div>`;
}

function openModal() { document.getElementById('modal-bg').classList.add('open'); }
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}
function saveNewExercise() {
  const name = document.getElementById('ex-name-input').value.trim();
  if (!name) { showToast('Escribe un nombre'); return; }
  const cat = document.getElementById('ex-cat-input').value;
  const id = 'custom_' + Date.now();
  db.exercises.push({ id, name, category: cat });
  save(); closeModal();
  render();
  showToast('Ejercicio añadido');
}
function deleteExercise(id) {
  db.exercises = db.exercises.filter(e => e.id !== id);
  save(); render();
}
function goToProgressEx(id) {
  selectedProgressEx = id;
  goTo('progress');
}

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function getExName(id) {
  return db.exercises.find(e => e.id === id)?.name || id;
}
function getLastLoad(exId, excludeSessionId) {
  const sessions = db.sessions.filter(s => s.id !== excludeSessionId).slice().reverse();
  for (const sess of sessions) {
    const entry = sess.entries.find(e => e.exId === exId);
    if (entry && entry.sets.length > 0) {
      const last = entry.sets[entry.sets.length - 1];
      return { weight: last.weight, reps: last.reps };
    }
  }
  return null;
}
function renderSessionHistory(limit) {
  return db.sessions.slice(-limit).reverse().map(s => {
    const vol = s.entries.reduce((a, e) => a + e.sets.reduce((b, se) => b + se.weight * se.reps, 0), 0);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:15px;font-weight:700;text-transform:uppercase">${formatDate(s.date)}</div>
        <div style="font-family:var(--mono);font-size:14px;color:var(--amber)">${(vol/1000).toFixed(2)}t</div>
      </div>
      <div style="font-size:12px;font-family:var(--mono);color:var(--muted)">${s.entries.map(e=>getExName(e.exId)).join(' · ')}</div>
    </div>`;
  }).join('');
}
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatDateShort(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
render();

// Re-setup live vol previews and session inputs after each render
const observer = new MutationObserver(() => {
  if (currentPage === 'session') setupVolPreviews();
});
observer.observe(document.getElementById('view'), { childList: true });

// PWA service worker (inline)
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([`
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request))
    ));
  `], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}
</script>
</body>
</html>
