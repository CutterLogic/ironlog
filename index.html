<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IRONLOG — Strength Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f0e;
  --bg2: #1a1a18;
  --bg3: #252522;
  --amber: #e8a020;
  --amber2: #f5c44a;
  --amber3: #7a4e08;
  --text: #f0ede6;
  --muted: #8a8880;
  --dim: #3a3a37;
  --danger: #e04040;
  --green: #3ab06a;
  --mono: 'Space Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  /* Safe areas — always defined */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
  /* Nav height: button area (56px) + home indicator safe area */
  --nav-h: calc(56px + max(env(safe-area-inset-bottom, 0px), 8px));
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Remove iOS tap flash on every interactive element */
a, button, input, select, textarea, [onclick] {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; /* prevent 300ms tap delay */
}
/* Prevent iOS from zooming inputs (font-size must be ≥16px on inputs) */
input, select, textarea { font-size: 16px; }

html {
  /* dvh adapts when Safari toolbar shows/hides */
  height: 100dvh;
  background: var(--bg);
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  /* Match html exactly */
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--cond);
  overflow: hidden;
  overscroll-behavior: none;
  /* Safe area insets: top and sides only — bottom handled by nav */
  padding-top: env(safe-area-inset-top, 0px);
  padding-left: env(safe-area-inset-left, 0px);
  padding-right: env(safe-area-inset-right, 0px);
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  /* Subtract body's top padding so total = 100dvh */
  height: calc(100dvh - env(safe-area-inset-top, 0px));
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  background: var(--bg);
}

/* #view fills all remaining space between header and nav */
#view {
  flex: 1;
  min-height: 0; /* critical: allows flex child to shrink below content size */
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  /* bottom padding = nav height so last item is visible above nav */
  padding-bottom: var(--nav-h);
  scrollbar-width: none;
}
#view::-webkit-scrollbar { display: none; }

/* ── NAV BAR ── */
#nav {
  position: fixed;
  bottom: 0;
  left: env(safe-area-inset-left, 0px);
  right: env(safe-area-inset-right, 0px);
  max-width: 480px;
  /* Center when screen > 480px */
  margin: 0 auto;
  background: rgba(15,15,14,.97);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-top: 1px solid var(--dim);
  display: flex;
  /* Pad bottom buttons above home indicator */
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 4px 8px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  font-family: var(--cond);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: color .15s;
  /* Minimum tap target 44px per Apple HIG */
  min-height: 44px;
  -webkit-user-select: none;
  user-select: none;
}
.nav-btn.active { color: var(--amber); }
.nav-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--dim);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.page-title { font-size: 26px; font-weight: 800; letter-spacing: -.01em; text-transform: uppercase; line-height: 1; }
.page-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* ── CARDS ── */
.card { background: var(--bg2); border: 1px solid var(--dim); border-radius: 14px; padding: 16px; margin: 0 14px 12px; }
.card-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

/* ── DASHBOARD ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 14px 0; }
.stat-box { background: var(--bg2); border: 1px solid var(--dim); border-radius: 14px; padding: 14px; }
.stat-val { font-size: 28px; font-weight: 800; color: var(--amber); font-family: var(--mono); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-top: 5px; }
.last-session-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--dim); }
.last-session-item:last-child { border-bottom: none; padding-bottom: 0; }
.ex-name { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.ex-detail { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-top: 3px; }
.ex-vol { font-size: 17px; font-weight: 800; color: var(--amber); font-family: var(--mono); }

/* ── BUTTONS ── */
.btn {
  background: var(--amber);
  color: #0f0f0e;
  border: none;
  border-radius: 10px;
  padding: 13px 20px;
  font-family: var(--cond);
  font-size: 16px;
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  cursor: pointer;
  /* Prevents double-tap zoom on iOS */
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
  transition: opacity .12s;
  /* Minimum tap target */
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.btn:active { opacity: .75; }
.btn.secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--dim); }
.btn.danger { background: rgba(224,64,64,.15); color: var(--danger); border: 1px solid rgba(224,64,64,.25); }
.btn.small { padding: 8px 14px; font-size: 14px; border-radius: 8px; min-height: 36px; }
.btn:disabled { opacity: .35; pointer-events: none; }

/* ── SET INPUT ── */
.set-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.input-block label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
.input-block input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--dim);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--mono);
  /* 16px minimum prevents iOS auto-zoom */
  font-size: 28px;
  font-weight: 700;
  padding: 12px 8px;
  text-align: center;
  outline: none;
  transition: border-color .15s, background .15s;
  /* Remove iOS inner shadow on inputs */
  -webkit-appearance: none;
  appearance: none;
  /* Remove iOS rounded corners */
  border-radius: 10px;
}
.input-block input:focus { border-color: var(--amber); background: #2a2a27; }
/* Hide number spinners */
.input-block input::-webkit-outer-spin-button,
.input-block input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.input-block input[type=number] { -moz-appearance: textfield; }

/* ── SERIES LOGGED ── */
.series-list { display: flex; flex-direction: column; gap: 6px; }
.series-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg3); border-radius: 10px; border: 1px solid var(--dim); }
.series-num { font-size: 11px; font-weight: 700; color: var(--muted); font-family: var(--mono); min-width: 24px; background: var(--bg); border-radius: 4px; padding: 2px 5px; text-align: center; }
.series-data { flex: 1; font-size: 16px; font-weight: 700; font-family: var(--mono); letter-spacing: .02em; }
.series-vol { font-size: 12px; color: var(--amber); font-family: var(--mono); font-weight: 700; }
.series-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 6px; min-width: 32px; min-height: 32px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }

/* ── HIST BADGE ── */
.hist-badge { background: rgba(232,160,32,.1); color: var(--amber2); font-size: 11px; font-family: var(--mono); font-weight: 700; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--amber3); display: inline-block; margin-top: 4px; }

/* ── TIMER (stub — real styles inline) ── */
#timer-overlay { display: none; }

/* ── PROGRESS ── */
.chart-wrap { position: relative; height: 200px; margin: 0 0 12px; }
.ex-history-item { padding: 12px 0; border-bottom: 1px solid var(--dim); }
.ex-history-item:last-child { border-bottom: none; }
.ex-history-date { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 6px; font-weight: 700; letter-spacing: .04em; }
.ex-history-sets { display: flex; flex-wrap: wrap; gap: 5px; }
.set-pill { font-size: 12px; font-family: var(--mono); font-weight: 700; background: var(--bg3); border: 1px solid var(--dim); border-radius: 6px; padding: 4px 9px; color: var(--text); }

/* ── EXERCISES ── */
.ex-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--dim); }
.ex-item:last-child { border-bottom: none; }
.ex-item-name { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
.ex-item-cat { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 700; letter-spacing: .06em; }

/* ── NOTES ── */
.notes-area {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--dim);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--cond);
  font-size: 16px; /* ≥16 prevents iOS zoom */
  padding: 12px 14px;
  resize: none;
  min-height: 68px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.notes-area:focus { border-color: var(--amber); }

/* ── TOAST ── */
/* Position below notch using safe-top */
#toast {
  position: fixed;
  top: calc(var(--sat) + 16px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--amber);
  color: var(--amber2);
  font-family: var(--cond);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .05em;
  padding: 10px 20px;
  border-radius: 10px;
  z-index: 500;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
  text-transform: uppercase;
  white-space: nowrap;
  max-width: calc(100% - 40px);
}
#toast.show { opacity: 1; }

/* ── MODALS ── */
/* modal-bg covers full screen including safe areas */
#modal-bg, #clear-modal-bg {
  position: fixed;
  /* Extend beyond safe-area to cover full screen */
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.78);
  z-index: 150;
  display: none;
  align-items: flex-end;
}
#modal-bg.open, #clear-modal-bg.open { display: flex; }
#modal {
  background: var(--bg2);
  border-radius: 22px 22px 0 0;
  border: 1px solid var(--dim);
  border-bottom: none;
  /* Top padding generous, bottom accounts for home indicator */
  padding: 22px 18px calc(20px + max(var(--sab), 20px));
  width: 100%;
  /* Limit height so modal doesn't cover full screen */
  max-height: 85vh;
  max-height: 85dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#modal::-webkit-scrollbar { display: none; }
.modal-title { font-size: 22px; font-weight: 800; text-transform: uppercase; }
.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.form-row label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.form-row input, .form-row select {
  background: var(--bg3);
  border: 1px solid var(--dim);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--cond);
  font-size: 16px;
  font-weight: 600;
  padding: 12px 13px;
  outline: none;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.form-row input:focus, .form-row select:focus { border-color: var(--amber); }
/* Exercise search modal */
#ex-search { font-size: 16px; -webkit-appearance: none; appearance: none; }
#ex-search:focus { border-color: var(--amber) !important; }
#ex-search-list { scrollbar-width: none; }
#ex-search-list::-webkit-scrollbar { display: none; }
.ex-search-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--dim); cursor: pointer; min-height: 56px; }
.ex-search-item:last-child { border-bottom: none; }
.ex-search-item:active { background: rgba(255,255,255,.04); }
.ex-search-item-name { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
.ex-search-item-cat { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .06em; margin-top: 2px; }
.ex-search-item-check { color: var(--amber); font-size: 18px; opacity: 0; }
.ex-search-empty { padding: 24px 16px; font-size: 14px; color: var(--muted); font-family: var(--mono); text-align: center; }

/* ── SECTION TITLE ── */
.section-title { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: 18px 14px 8px; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 44px; margin-bottom: 14px; }
.empty-text { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
.empty-sub { font-size: 13px; margin-top: 6px; font-family: var(--mono); opacity: .7; }

/* ── NOTE TAG ── */
.note-tag { font-size: 11px; font-family: var(--mono); color: var(--amber); background: rgba(232,160,32,.1); border: 1px solid var(--amber3); border-radius: 5px; padding: 2px 7px; word-break: break-word; display: inline-block; margin-top: 3px; }

/* ── MISC UTILS ── */
.select-wrap { position: relative; }
.select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 14px; }
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse-anim 1.5s ease-in-out infinite; }
@keyframes pulse-anim { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.vol-change { font-size: 11px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; font-weight: 700; }
.vol-up { background: rgba(58,176,106,.15); color: var(--green); }
.vol-down { background: rgba(224,64,64,.12); color: var(--danger); }
.tag { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--dim); color: var(--muted); display: inline-block; }
</style>
</head>
<body>
<div id="app">
  <div id="view"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="goTo('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </button>
    <button class="nav-btn" id="nav-session" onclick="goTo('session')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      Sesión
    </button>
    <button class="nav-btn" id="nav-timer" onclick="toggleTimerPanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      <span id="nav-timer-label">Timer</span>
    </button>
    <button class="nav-btn" id="nav-progress" onclick="goTo('progress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 17 9 11 13 15 21 7"/><line x1="3" y1="21" x2="21" y2="21"/></svg>
      Progresión
    </button>
    <button class="nav-btn" id="nav-exercises" onclick="goTo('exercises')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M7 6.5v11M17 6.5v11"/></svg>
      Ejercicios
    </button>
  </nav>
</div>

<!-- Timer panel (sits above nav bar) -->
<div id="timer-panel" style="
  position:fixed;
  bottom:0; left:0; right:0;
  max-width:480px; margin:0 auto;
  z-index:99;
  background:var(--bg2);
  border-top:1px solid var(--dim);
  padding:16px 18px;
  padding-bottom:calc(var(--nav-h) + 6px);
  display:none; flex-direction:column; gap:14px;
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
">
  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Cronómetro</div>
    <button onclick="closeTimerPanel()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:4px 6px;min-width:36px;min-height:36px;touch-action:manipulation">✕</button>
  </div>
  <!-- Input + Start row -->
  <div style="display:flex;align-items:center;gap:10px">
    <div style="flex:1;position:relative">
      <input id="timer-input" type="text" placeholder="1:30" maxlength="5"
        inputmode="numeric"
        style="width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:12px;
               color:var(--text);font-family:var(--mono);font-size:34px;font-weight:700;
               text-align:center;padding:14px 8px;outline:none;
               -webkit-appearance:none;appearance:none;letter-spacing:.08em;
               transition:border-color .15s;min-height:64px;"
        oninput="formatTimerInput(this)"
        onkeydown="if(event.key==='Enter') toggleTimer()">
      <div id="timer-running-display" style="
        position:absolute;inset:0;display:none;align-items:center;justify-content:center;
        font-family:var(--mono);font-size:34px;font-weight:700;letter-spacing:.08em;
        border-radius:12px;background:var(--bg3);border:1px solid var(--amber3);color:var(--amber);
        cursor:pointer;touch-action:manipulation;min-height:64px;">
        00:00
      </div>
    </div>
    <button id="timer-start-btn" onclick="toggleTimer()"
      style="background:var(--amber);color:#0f0f0e;border:none;border-radius:12px;
             font-family:var(--cond);font-size:16px;font-weight:800;letter-spacing:.05em;
             text-transform:uppercase;cursor:pointer;padding:0 22px;height:64px;
             touch-action:manipulation;white-space:nowrap;-webkit-appearance:none;flex-shrink:0;">
      START
    </button>
  </div>
  <!-- Progress bar -->
  <div style="height:4px;background:var(--dim);border-radius:2px;overflow:hidden">
    <div id="timer-bar" style="height:100%;background:var(--amber);width:100%;border-radius:2px;transition:width .9s linear"></div>
  </div>
</div>

<!-- Add exercise modal -->
<div id="modal-bg" onclick="closeModal(event)">
  <div id="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title" style="margin-bottom:0">Ejercicios</div>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;line-height:1">✕</button>
    </div>

    <!-- Search input -->
    <div style="position:relative;margin-bottom:12px">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="ex-search" type="text" placeholder="Buscar o crear ejercicio..."
        style="width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;color:var(--text);font-family:var(--cond);font-size:16px;font-weight:600;padding:12px 14px 12px 38px;outline:none;-webkit-appearance:none"
        oninput="filterExercises(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <!-- Filtered exercise list -->
    <div id="ex-search-list" style="max-height:280px;overflow-y:auto;margin-bottom:12px;border-radius:10px;border:1px solid var(--dim);background:var(--bg3)"></div>

    <!-- Create new section (shown when typing something not in list) -->
    <div id="ex-create-section" style="display:none">
      <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Categoría</div>
      <div class="select-wrap" style="margin-bottom:12px">
        <select id="ex-cat-input" style="width:100%;background:var(--bg3);border:1px solid var(--dim);border-radius:10px;color:var(--text);font-family:var(--cond);font-size:16px;font-weight:600;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none">
          <option>Piernas</option><option>Empuje</option><option>Jalón</option>
          <option>Core</option><option>Cardio</option><option>Olímpico</option><option>Otro</option>
        </select>
      </div>
      <button class="btn" style="width:100%" id="ex-create-btn" onclick="saveNewExercise()">＋ Crear ejercicio</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Clear data confirmation modal -->
<div id="clear-modal-bg" onclick="closeClearModal(event)" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:24px">
  <div style="background:var(--bg2);border:1px solid var(--dim);border-radius:18px;padding:28px 22px;width:100%;max-width:340px" onclick="event.stopPropagation()">
    <div style="font-size:32px;text-align:center;margin-bottom:12px">⚠️</div>
    <div style="font-size:20px;font-weight:800;text-transform:uppercase;text-align:center;margin-bottom:8px">¿Limpiar todo?</div>
    <div style="font-size:14px;color:var(--muted);font-family:var(--mono);text-align:center;margin-bottom:22px;line-height:1.6">
      Se eliminarán todas las sesiones y series registradas. Esta acción no se puede deshacer.
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn danger" style="width:100%;padding:15px;font-size:15px;background:rgba(224,64,64,.18);border:1px solid rgba(224,64,64,.35);color:var(--danger)" onclick="clearAllData()">
        Sí, borrar todo
      </button>
      <button class="btn secondary" style="width:100%;padding:15px;font-size:15px" onclick="closeClearModal()">
        Cancelar
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
// DATA LAYER
// ═══════════════════════════════
const DB_KEY = 'ironlog_v2';
let db = JSON.parse(localStorage.getItem(DB_KEY) || 'null') || {
  exercises: [
    { id: 'sq', name: 'Sentadilla', category: 'Piernas' },
    { id: 'bp', name: 'Press Banca', category: 'Empuje' },
    { id: 'dl', name: 'Peso Muerto', category: 'Jalón' },
    { id: 'ohp', name: 'Press Militar', category: 'Empuje' },
    { id: 'row', name: 'Remo Barra', category: 'Jalón' },
    { id: 'rdl', name: 'RDL', category: 'Piernas' },
    { id: 'dip', name: 'Fondos', category: 'Empuje' },
    { id: 'pu', name: 'Dominadas', category: 'Jalón' },
  ],
  sessions: [],
  currentSession: null
};
const save = () => localStorage.setItem(DB_KEY, JSON.stringify(db));

// ═══════════════════════════════
// TIMER (manual panel)
// ═══════════════════════════════
let timerInterval = null;
let timerTotal = 0, timerLeft = 0;
let timerPanelOpen = false;
let timerRunning = false;

function toggleTimerPanel() {
  timerPanelOpen = !timerPanelOpen;
  const panel = document.getElementById('timer-panel');
  const navBtn = document.getElementById('nav-timer');
  panel.style.display = timerPanelOpen ? 'flex' : 'none';
  navBtn.classList.toggle('active', timerPanelOpen);
  // Push view content up so it's not hidden behind timer panel (~160px) + nav
  const timerPanelH = timerPanelOpen ? '180px' : '0px';
  document.getElementById('view').style.paddingBottom =
    timerPanelOpen
      ? `calc(var(--nav-h) + 180px)`
      : `var(--nav-h)`;
  if (timerPanelOpen && !timerRunning) {
    setTimeout(() => document.getElementById('timer-input').focus(), 120);
  }
}

function closeTimerPanel() {
  timerPanelOpen = false;
  document.getElementById('timer-panel').style.display = 'none';
  document.getElementById('nav-timer').classList.remove('active');
  document.getElementById('view').style.paddingBottom = 'var(--nav-h)';
}

// Format input as user types: auto-insert colon → "130" → "1:30"
function formatTimerInput(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 4) v = v.slice(0, 4);
  if (v.length >= 3) {
    v = v.slice(0, v.length - 2) + ':' + v.slice(-2);
  }
  el.value = v;
}

function parseTimerInput() {
  const val = document.getElementById('timer-input').value.trim();
  if (!val) return 0;
  if (val.includes(':')) {
    const [m, s] = val.split(':').map(Number);
    return (isNaN(m) ? 0 : m) * 60 + (isNaN(s) ? 0 : s);
  }
  return parseInt(val) || 0;
}

function fmtMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function toggleTimer() {
  if (timerRunning) {
    stopTimer();
  } else {
    const secs = parseTimerInput();
    if (!secs || secs <= 0) {
      document.getElementById('timer-input').style.borderColor = 'var(--danger)';
      setTimeout(() => document.getElementById('timer-input').style.borderColor = '', 800);
      return;
    }
    startTimerNew(secs);
  }
}

function startTimerNew(seconds) {
  clearInterval(timerInterval);
  timerTotal = seconds; timerLeft = seconds;
  timerRunning = true;

  const input = document.getElementById('timer-input');
  const display = document.getElementById('timer-running-display');
  const btn = document.getElementById('timer-start-btn');
  const bar = document.getElementById('timer-bar');
  const navLabel = document.getElementById('nav-timer-label');

  input.style.display = 'none';
  display.style.display = 'flex';
  display.textContent = fmtMMSS(timerLeft);
  btn.textContent = 'STOP';
  btn.style.background = 'rgba(224,64,64,.18)';
  btn.style.color = 'var(--danger)';
  btn.style.border = '1px solid rgba(224,64,64,.35)';
  bar.style.width = '100%';
  bar.style.background = 'var(--amber)';
  navLabel.textContent = fmtMMSS(timerLeft);

  timerInterval = setInterval(() => {
    timerLeft--;
    display.textContent = fmtMMSS(timerLeft);
    navLabel.textContent = fmtMMSS(timerLeft);
    bar.style.width = (timerLeft / timerTotal * 100) + '%';
    if (timerLeft <= 10) bar.style.background = 'var(--danger)';
    else if (timerLeft <= 30) bar.style.background = 'var(--amber)';

    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      onTimerDone();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  resetTimerUI();
}

function onTimerDone() {
  timerRunning = false;
  beep();
  vibrate([200, 100, 200, 100, 400]);
  showToast('¡Tiempo de descanso completado!');
  resetTimerUI();
}

function resetTimerUI() {
  const input = document.getElementById('timer-input');
  const display = document.getElementById('timer-running-display');
  const btn = document.getElementById('timer-start-btn');
  const bar = document.getElementById('timer-bar');
  const navLabel = document.getElementById('nav-timer-label');

  input.style.display = '';
  display.style.display = 'none';
  btn.textContent = 'START';
  btn.style.background = 'var(--amber)';
  btn.style.color = '#0f0f0e';
  btn.style.border = 'none';
  bar.style.width = '100%';
  bar.style.background = 'var(--amber)';
  navLabel.textContent = 'Timer';
}

let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = [880, 660, 880];
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = audioCtx.currentTime + i * 0.15;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t); o.stop(t + 0.12);
    });
  } catch(e) {}
}
function vibrate(pattern) { try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {} }

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════
// ROUTING
// ═══════════════════════════════
let currentPage = 'dashboard';
function goTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  render();
}

function render() {
  const v = document.getElementById('view');
  if (currentPage === 'dashboard') v.innerHTML = renderDashboard();
  else if (currentPage === 'session') v.innerHTML = renderSession();
  else if (currentPage === 'progress') { v.innerHTML = renderProgress(); initProgressChart(); }
  else if (currentPage === 'exercises') v.innerHTML = renderExercises();
}

// ═══════════════════════════════
// DASHBOARD
// ═══════════════════════════════
function renderDashboard() {
  const sessions = db.sessions;
  const last = sessions[sessions.length - 1];
  const totalVol = (s) => s.entries.reduce((a, e) => a + e.sets.reduce((b, se) => b + se.weight * se.reps, 0), 0);
  const totalSets = (s) => s.entries.reduce((a, e) => a + e.sets.length, 0);

  let statsHtml = '';
  if (last) {
    const vol = totalVol(last);
    const prevSessions = sessions.slice(0, -1);
    let volChangeHtml = '';
    if (prevSessions.length > 0) {
      const prevVol = totalVol(prevSessions[prevSessions.length - 1]);
      if (prevVol > 0) {
        const pct = ((vol - prevVol) / prevVol * 100).toFixed(0);
        const cls = pct >= 0 ? 'vol-up' : 'vol-down';
        volChangeHtml = `<span class="vol-change ${cls}">${pct >= 0 ? '+' : ''}${pct}%</span>`;
      }
    }
    statsHtml = `
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val">${(vol/1000).toFixed(1)}<span style="font-size:14px;color:var(--muted)"> klb</span></div>
          <div class="stat-lbl">Volumen ${volChangeHtml}</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${totalSets(last)}</div>
          <div class="stat-lbl">Series totales</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${last.entries.length}</div>
          <div class="stat-lbl">Ejercicios</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${sessions.length}</div>
          <div class="stat-lbl">Sesiones</div>
        </div>
      </div>`;
  }

  let lastSessionHtml = '';
  if (last) {
    const items = last.entries.map(e => {
      const vol = e.sets.reduce((a, s) => a + s.weight * s.reps, 0);
      const best = e.sets.reduce((a, s) => Math.max(a, s.weight), 0);
      const noteTag = e.note ? `<span class="note-tag">${e.note}</span>` : '';
      return `<div class="last-session-item">
        <div>
          <div class="ex-name">${getExName(e.exId)}</div>
          <div class="ex-detail">${e.sets.length} series · Mejor: ${best}lb ${noteTag}</div>
        </div>
        <div class="ex-vol">${vol.toLocaleString()}lb</div>
      </div>`;
    }).join('');
    lastSessionHtml = `
      <div class="section-title">Última sesión — ${formatDate(last.date)}</div>
      <div class="card">${items || '<div class="empty-text" style="font-size:14px;padding:8px 0;color:var(--muted)">Sin entradas</div>'}</div>`;
  }

  const ongoing = db.currentSession;
  const ongoingBanner = ongoing ? `
    <div style="margin:16px 16px 0;background:rgba(232,160,32,.12);border:1px solid var(--amber3);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="goTo('session')">
      <div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:6px"><span class="pulse-dot"></span> Sesión activa</div>
        <div style="font-size:14px;font-family:var(--mono);margin-top:3px;color:var(--muted)">${ongoing.entries.reduce((a,e)=>a+e.sets.length,0)} series registradas</div>
      </div>
      <div style="font-size:22px;color:var(--amber)">→</div>
    </div>` : '';

  const emptyState = !last && !ongoing ? `
    <div class="empty">
      <div class="empty-icon">🏋️</div>
      <div class="empty-text">Sin sesiones aún</div>
      <div class="empty-sub">Inicia tu primera sesión en la pestaña "Sesión"</div>
    </div>` : '';

  return `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div class="page-title">IRONLOG</div>
        <div class="page-sub">Strength Tracker MVP</div>
      </div>
      ${(db.sessions.length > 0 || db.currentSession) ? `
      <button class="btn secondary small" onclick="confirmClear()"
        style="display:flex;align-items:center;gap:5px;color:var(--muted);font-size:12px;padding:7px 12px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Limpiar
      </button>` : ''}
    </div>
    ${ongoingBanner}
    ${statsHtml}
    ${lastSessionHtml}
    ${emptyState}
    <div style="height:8px"></div>`;
}

// ═══════════════════════════════
// SESSION
// ═══════════════════════════════

function renderSession() {
  const s = db.currentSession;

  if (!s) {
    return `
      <div class="page-header">
        <div class="page-title">Nueva sesión</div>
        <div class="page-sub">${formatDate(new Date().toISOString())}</div>
      </div>
      <div style="padding:24px 16px">
        <button class="btn" style="width:100%;padding:18px;font-size:20px" onclick="startSession()">
          ＋ Iniciar sesión
        </button>
      </div>
      ${db.sessions.length > 0 ? `<div class="section-title">Historial rápido</div>${renderSessionHistory(3)}` : ''}`;
  }

  const entriesHtml = s.entries.map((e, ei) => {
    const exName = getExName(e.exId);
    const lastLoad = getLastLoad(e.exId, s.id);
    const histBadge = lastLoad ? `<span class="hist-badge">Última: ${lastLoad.weight}lb × ${lastLoad.reps}</span>` : '';
    const setsHtml = e.sets.map((set, si) => `
      <div class="series-row">
        <span class="series-num">S${si+1}</span>
        <span class="series-data">${set.weight}lb × ${set.reps}</span>
        <span class="series-vol">${(set.weight*set.reps).toLocaleString()}lb</span>
        <button class="series-delete" onclick="deleteSet(${ei},${si})">✕</button>
      </div>`).join('');

    const volTotal = e.sets.reduce((a, s) => a + s.weight * s.reps * e.sets.length, 0);
    return `
      <div class="card" style="margin-top:${ei===0?'16px':'0'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.03em">${exName}</div>
            ${histBadge}
          </div>
          <button class="btn danger small" onclick="removeEntry(${ei})">✕</button>
        </div>
        <div class="series-list">${setsHtml || '<div style="font-size:13px;color:var(--muted);padding:4px 0;font-family:var(--mono)">Sin series aún</div>'}</div>
        ${e.sets.length ? `<div style="margin-top:8px;font-size:12px;font-family:var(--mono);color:var(--muted)">Volumen total: ${e.sets.reduce((a,s)=>a+s.weight*s.reps,0).toLocaleString()} lb (${e.sets.length} series)</div>` : ''}
        <div style="margin-top:14px">
          <div class="set-input-grid" id="inputs-${ei}">
            <div class="input-block"><label>Lb</label><input type="number" id="w-${ei}" value="${getLastWeight(e)}" min="0" step="5" inputmode="decimal"></div>
            <div class="input-block"><label>Reps</label><input type="number" id="r-${ei}" value="${getLastReps(e)}" min="1" max="100" inputmode="numeric"></div>
          </div>
          <textarea class="notes-area" id="note-${ei}" placeholder="Notas: técnica, fatiga, subir peso...">${e.note||''}</textarea>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn secondary small" onclick="saveNote(${ei})">Nota ✎</button>
            <button class="btn" style="flex:1;padding:14px" onclick="logSet(${ei})">✓ Serie completada</button>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div class="page-title">Sesión activa</div>
        <div class="page-sub">${formatDate(s.date)} · ${s.entries.reduce((a,e)=>a+e.sets.length,0)} series</div>
      </div>
      <button class="btn danger small" onclick="finishSession()">Finalizar</button>
    </div>

    <div style="padding:12px 16px 0">
      <button class="btn secondary" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px" onclick="openModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Buscar y añadir ejercicio
      </button>
    </div>

    ${entriesHtml || `<div class="empty"><div class="empty-icon">💪</div><div class="empty-text">Añade un ejercicio</div><div class="empty-sub">Pulsa el botón de arriba para buscar</div></div>`}
    <div style="height:8px"></div>`;
}

function startSession() {
  db.currentSession = { id: Date.now().toString(), date: new Date().toISOString(), entries: [] };
  save(); render();
}

function finishSession() {
  if (!db.currentSession) return;
  if (db.currentSession.entries.length === 0) { db.currentSession = null; save(); render(); return; }
  db.sessions.push(db.currentSession);
  db.currentSession = null;
  save();
  showToast('Sesión guardada — ¡Buen trabajo!');
  goTo('dashboard');
}

function removeEntry(ei) {
  db.currentSession.entries.splice(ei, 1);
  save(); render();
}

function logSet(ei) {
  const w = parseFloat(document.getElementById(`w-${ei}`).value);
  const r = parseInt(document.getElementById(`r-${ei}`).value);
  if (!w || !r || w <= 0 || r <= 0) { showToast('Peso y reps deben ser > 0'); return; }
  db.currentSession.entries[ei].sets.push({ weight: w, reps: r });
  save(); render();
  vibrate([30]);
}

function deleteSet(ei, si) {
  db.currentSession.entries[ei].sets.splice(si, 1);
  save(); render();
}

function saveNote(ei) {
  const note = document.getElementById(`note-${ei}`)?.value.trim();
  db.currentSession.entries[ei].note = note;
  save();
  showToast('Nota guardada');
}

function getLastWeight(entry) {
  if (entry.sets.length > 0) return entry.sets[entry.sets.length - 1].weight;
  const last = getLastLoad(entry.exId);
  return last ? last.weight : 135;
}
function getLastReps(entry) {
  if (entry.sets.length > 0) return entry.sets[entry.sets.length - 1].reps;
  const last = getLastLoad(entry.exId);
  return last ? last.reps : 5;
}

// ═══════════════════════════════
// PROGRESS
// ═══════════════════════════════
let progressChart = null;
let selectedProgressEx = null;

function renderProgress() {
  if (!selectedProgressEx && db.exercises.length) selectedProgressEx = db.exercises[0].id;
  const exOptions = db.exercises.map(ex => `<option value="${ex.id}" ${ex.id===selectedProgressEx?'selected':''}>${ex.name}</option>`).join('');

  const historyHtml = getExHistory(selectedProgressEx).reverse().map(sess => {
    const pills = sess.sets.map(s => `<span class="set-pill">${s.weight}lb × ${s.reps}</span>`).join('');
    const vol = sess.sets.reduce((a,s)=>a+s.weight*s.reps*sess.sets.length,0);
    const noteTag = sess.note ? `<span class="note-tag">${sess.note}</span>` : '';
    return `<div class="ex-history-item">
      <div class="ex-history-date">${formatDate(sess.date)} · Vol: ${vol.toLocaleString()}lb</div>
      <div class="ex-history-sets">${pills}</div>
      ${noteTag ? `<div style="margin-top:5px">${noteTag}</div>` : ''}
    </div>`;
  }).join('');

  return `
    <div class="page-header">
      <div class="page-title">Progresión</div>
      <div class="page-sub">Volumen por ejercicio</div>
    </div>
    <div style="padding:16px 16px 8px">
      <div class="select-wrap">
        <select onchange="changeProgressEx(this.value)">${exOptions}</select>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Volumen de carga (Peso × Reps × Series)</div>
      <div class="chart-wrap"><canvas id="prog-chart"></canvas></div>
    </div>
    <div class="section-title">Historial detallado</div>
    <div class="card">
      ${historyHtml || `<div style="font-size:13px;color:var(--muted);font-family:var(--mono);padding:4px 0">Sin datos para este ejercicio</div>`}
    </div>
    <div style="height:8px"></div>`;
}

function changeProgressEx(id) {
  selectedProgressEx = id;
  render();
  initProgressChart();
}

function initProgressChart() {
  const canvas = document.getElementById('prog-chart');
  if (!canvas) return;
  if (progressChart) { progressChart.destroy(); progressChart = null; }

  const history = getExHistory(selectedProgressEx);
  const labels = history.map(h => formatDateShort(h.date));
  const data = history.map(h => h.sets.reduce((a,s)=>a+s.weight*s.reps*h.sets.length,0));
  const maxW = history.map(h => h.sets.reduce((a,s)=>Math.max(a,s.weight),0));

  progressChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Volumen (lb)',
          data,
          backgroundColor: 'rgba(232,160,32,.25)',
          borderColor: 'rgba(232,160,32,.7)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'Peso máx (lb)',
          data: maxW,
          borderColor: '#e8a020',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointBackgroundColor: '#e8a020',
          pointRadius: 4,
          tension: 0.35,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.06)' }, ticks: { color: '#8a8880', font: { family: "'Space Mono'" , size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,.06)' }, ticks: { color: '#8a8880', font: { family: "'Space Mono'", size: 10 } }, position: 'left' },
        y2: { grid: { display: false }, ticks: { color: '#e8a020', font: { family: "'Space Mono'", size: 10 } }, position: 'right' },
      }
    }
  });
}

function getExHistory(exId) {
  const result = [];
  db.sessions.forEach(sess => {
    const entry = sess.entries.find(e => e.exId === exId);
    if (entry && entry.sets.length > 0) {
      result.push({ date: sess.date, sets: entry.sets, note: entry.note });
    }
  });
  if (db.currentSession) {
    const entry = db.currentSession.entries.find(e => e.exId === exId);
    if (entry && entry.sets.length > 0) {
      result.push({ date: db.currentSession.date, sets: entry.sets, note: entry.note });
    }
  }
  return result;
}

// ═══════════════════════════════
// EXERCISES
// ═══════════════════════════════
function renderExercises() {
  const byCategory = {};
  db.exercises.forEach(ex => {
    if (!byCategory[ex.category]) byCategory[ex.category] = [];
    byCategory[ex.category].push(ex);
  });

  const html = Object.entries(byCategory).map(([cat, exs]) => `
    <div class="section-title">${cat}</div>
    <div class="card">
      ${exs.map(ex => {
        const sessionCount = db.sessions.filter(s => s.entries.find(e => e.exId === ex.id)).length;
        const lastLoad = getLastLoad(ex.id);
        return `<div class="ex-item">
          <div>
            <div class="ex-item-name">${ex.name}</div>
            <div class="ex-item-cat">${sessionCount} sesiones${lastLoad ? ` · Última: ${lastLoad.weight}lb × ${lastLoad.reps}` : ''}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn secondary small" onclick="goToProgressEx('${ex.id}')">📈</button>
            <button class="btn secondary small" style="color:var(--danger)" onclick="deleteExercise('${ex.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');

  return `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <div class="page-title">Ejercicios</div>
        <div class="page-sub">${db.exercises.length} ejercicios</div>
      </div>
      <button class="btn small" onclick="openModal()">＋ Nuevo</button>
    </div>
    ${html}
    <div style="height:8px"></div>`;
}

function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('ex-search').value = '';
  document.getElementById('ex-create-section').style.display = 'none';
  renderExSearchList('');
  setTimeout(() => document.getElementById('ex-search').focus(), 100);
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}

function filterExercises(query) {
  renderExSearchList(query.trim());
  const q = query.trim();
  const exact = db.exercises.find(e => e.name.toLowerCase() === q.toLowerCase());
  const hasResults = db.exercises.filter(e => e.name.toLowerCase().includes(q.toLowerCase())).length > 0;
  const createSection = document.getElementById('ex-create-section');
  const createBtn = document.getElementById('ex-create-btn');
  if (q.length > 1 && !exact) {
    createSection.style.display = 'block';
    createBtn.textContent = `＋ Crear "${q}"`;
  } else {
    createSection.style.display = 'none';
  }
}

function renderExSearchList(query) {
  const list = document.getElementById('ex-search-list');
  const filtered = query
    ? db.exercises.filter(e => e.name.toLowerCase().includes(query.toLowerCase()))
    : db.exercises;
  if (filtered.length === 0) {
    list.innerHTML = `<div class="ex-search-empty">Sin resultados para "${query}"</div>`;
    return;
  }
  list.innerHTML = filtered.map(ex => `
    <div class="ex-search-item" onclick="selectExerciseFromModal('${ex.id}')">
      <div>
        <div class="ex-search-item-name">${highlightMatch(ex.name, query)}</div>
        <div class="ex-search-item-cat">${ex.category}</div>
      </div>
      <span class="ex-search-item-check">✓</span>
    </div>`).join('');
}

function highlightMatch(name, query) {
  if (!query) return name;
  const idx = name.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return name;
  return name.slice(0, idx) +
    `<span style="color:var(--amber)">${name.slice(idx, idx + query.length)}</span>` +
    name.slice(idx + query.length);
}

function selectExerciseFromModal(id) {
  if (!db.currentSession) {
    closeModal();
    showToast('Inicia una sesión primero');
    return;
  }
  const exists = db.currentSession.entries.find(e => e.exId === id);
  if (exists) { showToast('Ejercicio ya añadido'); closeModal(); return; }
  db.currentSession.entries.push({ exId: id, sets: [], note: '' });
  save();
  closeModal();
  goTo('session');
  setTimeout(() => {
    const cards = document.querySelectorAll('.card');
    if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 80);
}

function saveNewExercise() {
  const name = document.getElementById('ex-search').value.trim();
  if (!name) { showToast('Escribe un nombre'); return; }
  const already = db.exercises.find(e => e.name.toLowerCase() === name.toLowerCase());
  if (already) { selectExerciseFromModal(already.id); return; }
  const cat = document.getElementById('ex-cat-input').value;
  const id = 'custom_' + Date.now();
  db.exercises.push({ id, name, category: cat });
  save();
  showToast('Ejercicio creado');
  selectExerciseFromModal(id);
}
function deleteExercise(id) {
  db.exercises = db.exercises.filter(e => e.id !== id);
  save(); render();
}
function confirmClear() {
  document.getElementById('clear-modal-bg').style.display = 'flex';
}
function closeClearModal(e) {
  if (!e || e.target === document.getElementById('clear-modal-bg')) {
    document.getElementById('clear-modal-bg').style.display = 'none';
  }
}
function clearAllData() {
  db.sessions = [];
  db.currentSession = null;
  save();
  document.getElementById('clear-modal-bg').style.display = 'none';
  showToast('Datos borrados');
  render();
}
function goToProgressEx(id) {
  selectedProgressEx = id;
  goTo('progress');
}

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function getExName(id) {
  return db.exercises.find(e => e.id === id)?.name || id;
}
function getLastLoad(exId, excludeSessionId) {
  const sessions = db.sessions.filter(s => s.id !== excludeSessionId).slice().reverse();
  for (const sess of sessions) {
    const entry = sess.entries.find(e => e.exId === exId);
    if (entry && entry.sets.length > 0) {
      const last = entry.sets[entry.sets.length - 1];
      return { weight: last.weight, reps: last.reps };
    }
  }
  return null;
}
function renderSessionHistory(limit) {
  return db.sessions.slice(-limit).reverse().map(s => {
    const vol = s.entries.reduce((a, e) => a + e.sets.reduce((b, se) => b + se.weight * se.reps, 0), 0);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:15px;font-weight:700;text-transform:uppercase">${formatDate(s.date)}</div>
        <div style="font-family:var(--mono);font-size:14px;color:var(--amber)">${(vol/1000).toFixed(1)}klb</div>
      </div>
      <div style="font-size:12px;font-family:var(--mono);color:var(--muted)">${s.entries.map(e=>getExName(e.exId)).join(' · ')}</div>
    </div>`;
  }).join('');
}
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatDateShort(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}

// INIT
// ═══════════════════════════════
render();
